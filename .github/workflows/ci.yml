name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install EAR with dev extras
        run: pip install -e '.[dev]'

      - name: Run test suite
        run: python -m pytest tests/ -q

  bare-environment:
    name: bare-environment (dependencies = [])
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install EAR with no third-party dependencies
        run: pip install -e .

      - name: Verify no third-party packages beyond pip/setuptools/wheel are present
        run: |
          python -m pip list --format=freeze \
            | grep -v -E '^(ear|pip|setuptools|wheel)==' \
            | tee /tmp/extra-deps.txt
          if [ -s /tmp/extra-deps.txt ]; then
            echo "Unexpected third-party dependency present -- EAR ships zero dependencies." >&2
            exit 1
          fi

      - name: Install pytest only to run the suite (not a declared dependency)
        run: pip install pytest>=7

      - name: Run test suite against the bare install
        run: python -m pytest tests/ -q
