name: Release to PyPI

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build sdist and wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify the tag matches the package version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match pyproject.toml version $pkg_version" >&2
            exit 1
          fi

      - name: Run the test suite before releasing anything
        run: |
          pip install -e '.[dev]'
          python -m pytest tests/ -q

      - name: Build distributions
        run: |
          pip install build twine
          python -m build --sdist --wheel
          python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # trusted publishing (OIDC) -- no stored API token needed
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
